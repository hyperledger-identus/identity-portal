services:

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.7
    ports:
      - "9980:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev --hostname-url=http://localhost:9980 --health-enabled=true

  keycloak-wait:
    image: badouralix/curl-jq:ubuntu
    command:
      - /bin/bash
      - -c
      - until curl http://keycloak:8080/health; do sleep 1; done && echo "Keycloak is ready."
    depends_on:
      keycloak:
        condition: service_started

  keycloak-init:
    image: badouralix/curl-jq:ubuntu
    command: ["/bin/bash", "/workspace/init-script.sh"]
    environment:
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_USER: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      REALM_NAME: atala-demo
      PRISM_AGENT_CLIENT_SECRET: prism-agent-demo-secret
      PORTAL_CLIENT_SECRET: identity-portal-ui-secret
      # Optional social login. Set these in your shell/.env to provision the
      # matching Keycloak identity provider; left empty they are skipped.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    volumes:
      - ./docker/keycloak-init.sh:/workspace/init-script.sh
    depends_on:
      keycloak-wait:
        condition: service_completed_successfully

  neoprism:
    image: docker.io/hyperledgeridentus/identus-neoprism:${NEOPRISM_VERSION:-0.13.0}
    pull_policy: if_not_present
    command: ["dev"]
    ports:
      - "${NEOPRISM_PORT:-8081}:8080"
    environment:
      NPRISM_CARDANO_NETWORK: custom
      NPRISM_CONFIRMATION_BLOCKS: "0"
      NPRISM_DB_URL: "sqlite::memory:"
      NPRISM_INDEX_INTERVAL: "1"
      RUST_LOG: info,oura=warn,tower_http::trace=debug
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/_system/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mongo-mediator:
    image: mongo:6.0
    command: ["--auth"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: mediator
    ports:
      - "${MONGO_PORT:-27017}:27017"
    tmpfs:
      - /data/db
    volumes:
      - ./docker/mongo-initdb.js:/docker-entrypoint-initdb.d/initdb.js:ro

  mediator:
    image: docker.io/hyperledgeridentus/identus-mediator:${MEDIATOR_VERSION:-latest}
    pull_policy: if_not_present
    ports:
      - "${MEDIATOR_PORT:-8080}:8080"
    environment:
      KEY_AGREEMENT_D: Z6D8LduZgZ6LnrOHPrMTS6uU2u5Btsrk1SGs4fn8M7c
      KEY_AGREEMENT_X: Sr4SkIskjN_VdKTn0zkjYbhGTWArdUNE4j_DmUpnQGw
      KEY_AUTHENTICATION_D: INXCnxFEl0atLIIQYruHzGd5sUivMRyQOzu87qVerug
      KEY_AUTHENTICATION_X: MBjnXZxkMcoQVVL21hahWAw43RuAG-i64ipbeKKqwoA
      SERVICE_ENDPOINTS: http://localhost:${MEDIATOR_PORT:-8080};ws://localhost:${MEDIATOR_PORT:-8080}/ws
      MONGODB_USER: admin
      MONGODB_PASSWORD: admin
      MONGODB_PROTOCOL: mongodb
      MONGODB_HOST: mongo-mediator
      MONGODB_PORT: 27017
      MONGODB_DB_NAME: mediator
    depends_on:
      - mongo-mediator
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mongo-identus:
    image: mongo:6.0
    command: ["--auth"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: identus
    ports:
      - "27019:27017"
    tmpfs:
      - /data/db
    volumes:
      - ./docker/mongo-initdb-identus.js:/docker-entrypoint-initdb.d/initdb.js:ro

  mongo-express:
      image: mongo-express
      environment:
          - PORT=4004
          - ME_CONFIG_MONGODB_SERVER=mongo-identus
          - ME_CONFIG_MONGODB_PORT=27017
          - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
          - ME_CONFIG_MONGODB_AUTH_DATABASE=admin
          - ME_CONFIG_MONGODB_AUTH_USERNAME=admin
          - ME_CONFIG_MONGODB_AUTH_PASSWORD=admin
          - ME_CONFIG_BASICAUTH_USERNAME=admin
          - ME_CONFIG_BASICAUTH_PASSWORD=admin
      depends_on:
          - mongo-identus
      ports:
        - "8888:4004"